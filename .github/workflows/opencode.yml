name: opencode
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Coder job — fires when /oc is commented on an ISSUE (not a PR)
  # Flow: Ready for Coding / Changes Requested → In Progress → Pr Open
  # ─────────────────────────────────────────────────────────────────────
  coder:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Mark issue in progress
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const has = (name) => labels.some(l => l.name === name);
            const remove = async (name) => {
              if (has(name)) {
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name }); } catch (e) {}
              }
            };
            await remove("agent:ready-for-coding");
            await remove("agent:changes-requested");
            if (!has("agent:in-progress")) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:in-progress"] });
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true

      - name: Mark issue PR open
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // Remove in-progress
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: "agent:in-progress" }); } catch (e) {}

            // Find the PR that closes this issue
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", sort: "created", direction: "desc", per_page: 10,
            });

            let linkedPr = null;
            for (const pr of prs) {
              const body = pr.body || "";
              const match = body.match(/closes\s+#(\d+)/i);
              if (match && parseInt(match[1]) === issue_number) {
                linkedPr = pr;
                break;
              }
            }

            // If no linked PR found, try to find the most recent open PR from the opencode branch
            if (!linkedPr) {
              for (const pr of prs) {
                if (pr.head.ref.startsWith("opencode/") || pr.head.ref.startsWith("agent/")) {
                  linkedPr = pr;
                  break;
                }
              }
            }

            // Ensure the PR body contains "Closes #N" so other automations can find it
            if (linkedPr) {
              const body = linkedPr.body || "";
              const closesPattern = new RegExp(`closes\\s+#${issue_number}`, "i");
              if (!closesPattern.test(body)) {
                const newBody = body + `\n\nCloses #${issue_number}`;
                await github.rest.pulls.update({ owner, repo, pull_number: linkedPr.number, body: newBody });
                console.log(`Updated PR #${linkedPr.number} body with 'Closes #${issue_number}'`);
              }
            }

            // Add agent:pr-open label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            if (!labels.some(l => l.name === "agent:pr-open")) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:pr-open"] });
            }

  # ─────────────────────────────────────────────────────────────────────
  # Reviewer job — fires when /oc is commented on a PR
  # Flow: Pr Open → In Review → (Changes Requested | Human Approval)
  # ─────────────────────────────────────────────────────────────────────
  reviewer:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Extract linked issue and mark in review
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.issue.number;

            // Get the PR to find the linked issue
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
            const body = pr.body || "";
            const match = body.match(/closes\s+#(\d+)/i);
            const issue_number = match ? parseInt(match[1]) : null;

            if (issue_number) {
              // Remove agent:pr-open, add agent:needs-review
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: "agent:pr-open" }); } catch (e) {}
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
              if (!labels.some(l => l.name === "agent:needs-review")) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:needs-review"] });
              }
              console.log(`Issue #${issue_number} moved to In Review for PR #${pr_number}`);
            } else {
              console.log("No linked issue found in PR body; skipping label swap.");
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            Review this pull request as the Orbit review agent.

            Steps:
            1. Read AGENTS.md and the linked issue (from "Closes #N" in the PR body).
            2. Review the PR diff for:
               - Correctness against the linked issue's acceptance criteria
               - Serious bugs and edge cases
               - Security or secrets leakage
               - Trading-safety regressions
               - Performance regressions
               - Maintainability problems that will cause near-term issues
            3. Do NOT make low-value style comments unless they block readability or project consistency.
            4. After reviewing, submit a formal PR review using the gh CLI:
               - If the PR is acceptable: run `gh pr review <PR_NUMBER> --approve --body "<summary>"`
               - If changes are needed: run `gh pr review <PR_NUMBER> --request-changes --body "<list of issues>"`
            5. You MUST submit a formal review via `gh pr review`. Do not just leave a comment.
            6. Use GITHUB_TOKEN for authentication (it's already in the environment).
