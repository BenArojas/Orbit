name: opencode
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  PROJECT_ID: "PVT_kwHOCdGZYc4Bbcft"
  STATUS_FIELD_ID: "PVTSSF_lAHOCdGZYc4BbcftzhWM-EQ"
  OPT_BACKLOG: "f75ad846"
  OPT_NEEDS_PLANNING: "61e4505c"
  OPT_READY_FOR_CODING: "47fc9ee4"
  OPT_IN_PROGRESS: "8a244bab"
  OPT_PR_OPEN: "778733cb"
  OPT_IN_REVIEW: "df73e18b"
  OPT_CHANGES_REQUESTED: "182692a0"
  OPT_HUMAN_APPROVAL: "4bff2a14"
  OPT_DONE: "98236657"

jobs:
  # ===================================================================
  # Planner job - fires when /oc is commented on an issue with
  # agent:needs-planning label
  # Flow: Needs Planning -> (agent creates sub-issues) -> Ready for Coding
  # ===================================================================
  planner:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue needs planning
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const needsPlanning = labels.some(l => l.name === "agent:needs-planning");
            core.setOutput("needs_planning", needsPlanning ? "true" : "false");
            if (needsPlanning) {
              console.log("Issue has agent:needs-planning label - running planner job");
            } else {
              console.log("Issue does not have agent:needs-planning label - skipping planner job");
            }

      - uses: actions/checkout@v4
        if: steps.check.outputs.needs_planning == 'true'
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.needs_planning == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            You are the Orbit planner agent. Read this parent issue and break it down into small executable sub-issues.

            Steps:
            1. Read the parent issue body and all comments carefully.
            2. Read AGENTS.md for workflow rules, constraints, and non-goals.
            3. Break the goal into 1-5 small tasks, each small enough for one focused PR.
            4. For each task, create a GitHub issue using:
               gh issue create --title "[Task]: <short title>" --label "agent:ready-for-coding" --label "risk:low" --body "<body>"
            5. The issue body MUST include these sections:
               - Task: What exactly should change
               - Relevant files: List likely files (keep it narrow)
               - Acceptance criteria: Concrete checklist
               - Non-goals: What to avoid
               - Test command: Which tests to run
               - Risk level: risk:low (or higher if justified)
               - Parent issue: "Part of #N"
            6. After creating each sub-issue, link it to this parent issue:
               gh issue edit <sub-issue-number> --add-assignee ""  # just to confirm it exists
            7. Do NOT create branches, push code, or open PRs. You are planning only.
            8. Do NOT create or switch git branches. Do NOT run git push or git remote commands.
            9. Keep each task tiny and safe. Prefer smaller tasks over larger ones.

      - name: Move parent to ready for coding
        if: steps.check.outputs.needs_planning == 'true' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // Update labels: remove agent:needs-planning, add agent:ready-for-coding
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: "agent:needs-planning" }); } catch (e) {}
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            if (!labels.some(l => l.name === "agent:ready-for-coding")) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:ready-for-coding"] });
            }

            // Directly update project board via GraphQL
            const itemQuery = `query {
              user(login: "${owner}") {
                projectV2(number: 1) {
                  items(first: 100) {
                    nodes { id content { ... on Issue { number } } }
                  }
                }
              }
            }`;
            const itemResult = await github.graphql(itemQuery);
            const item = itemResult.user.projectV2.items.nodes.find(n => n.content && n.content.number === issue_number);
            if (item) {
              const updateMutation = `mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project, itemId: $item, fieldId: $field,
                  value: { singleSelectOptionId: $value }
                }) { projectV2Item { id } }
              }`;
              await github.graphql(updateMutation, {
                project: process.env.PROJECT_ID, item: item.id,
                field: process.env.STATUS_FIELD_ID, value: process.env.OPT_READY_FOR_CODING
              });
              console.log(`Moved issue #${issue_number} to Ready For Coding`);
            } else {
              console.log(`Issue #${issue_number} not found in project`);
            }

  # ===================================================================
  # Coder job - fires when /oc is commented on an ISSUE without
  # agent:needs-planning label
  # Flow: Ready for Coding / Changes Requested -> In Progress -> Pr Open
  # ===================================================================
  coder:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue needs planning (skip coder if so)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const needsPlanning = labels.some(l => l.name === "agent:needs-planning");
            core.setOutput("needs_planning", needsPlanning ? "true" : "false");

      - name: Mark issue in progress + move board
        if: steps.check.outputs.needs_planning == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // Update labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const has = (name) => labels.some(l => l.name === name);
            const remove = async (name) => {
              if (has(name)) { try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name }); } catch (e) {} }
            };
            await remove("agent:ready-for-coding");
            await remove("agent:changes-requested");
            if (!has("agent:in-progress")) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:in-progress"] });
            }

            // Directly update project board via GraphQL
            const itemQuery = `query {
              user(login: "${owner}") {
                projectV2(number: 1) {
                  items(first: 100) { nodes { id content { ... on Issue { number } } } }
                }
              }
            }`;
            const itemResult = await github.graphql(itemQuery);
            const item = itemResult.user.projectV2.items.nodes.find(n => n.content && n.content.number === issue_number);
            if (item) {
              const updateMutation = `mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project, itemId: $item, fieldId: $field,
                  value: { singleSelectOptionId: $value }
                }) { projectV2Item { id } }
              }`;
              await github.graphql(updateMutation, {
                project: process.env.PROJECT_ID, item: item.id,
                field: process.env.STATUS_FIELD_ID, value: process.env.OPT_IN_PROGRESS
              });
              console.log(`Moved issue #${issue_number} to In Progress`);
            }

      - uses: actions/checkout@v4
        if: steps.check.outputs.needs_planning == 'false'
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.needs_planning == 'false'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            Implement this issue. Follow AGENTS.md for project rules.

            CRITICAL GIT RULES:
            - Do NOT create or switch git branches. The infrastructure creates a branch automatically.
            - Do NOT run git push, git remote, or any git remote commands.
            - Do NOT create pull requests or use gh pr create.
            - Just implement the changes, stage them with git add, and commit with git commit.
            - The opencode infrastructure handles branch creation, push, and PR creation automatically.

            Workflow:
            1. Read the issue body and acceptance criteria.
            2. Read AGENTS.md for project rules and constraints.
            3. Implement the smallest change that satisfies the issue.
            4. Run the test command from the issue if specified.
            5. git add and git commit your changes.
            6. Stop. The infrastructure will push and open a PR.

      - name: Mark issue PR open + move board
        if: steps.check.outputs.needs_planning == 'false' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // Remove in-progress
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: "agent:in-progress" }); } catch (e) {}

            // Find the PR that closes this issue
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", sort: "created", direction: "desc", per_page: 10,
            });

            let linkedPr = null;
            for (const pr of prs) {
              const body = pr.body || "";
              const match = body.match(/closes\s+#(\d+)/i);
              if (match && parseInt(match[1]) === issue_number) { linkedPr = pr; break; }
            }

            // Fallback: find most recent opencode PR
            if (!linkedPr) {
              for (const pr of prs) {
                if (pr.head.ref.startsWith("opencode/") || pr.head.ref.startsWith("agent/")) { linkedPr = pr; break; }
              }
            }

            // Ensure PR body contains "Closes #N"
            if (linkedPr) {
              const body = linkedPr.body || "";
              const closesPattern = new RegExp(`closes\\s+#${issue_number}`, "i");
              if (!closesPattern.test(body)) {
                const newBody = body + `\n\nCloses #${issue_number}`;
                await github.rest.pulls.update({ owner, repo, pull_number: linkedPr.number, body: newBody });
                console.log(`Updated PR #${linkedPr.number} body with 'Closes #${issue_number}'`);
              }
            }

            // Add agent:pr-open label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            if (!labels.some(l => l.name === "agent:pr-open")) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:pr-open"] });
            }

            // Directly update project board via GraphQL
            const itemQuery = `query {
              user(login: "${owner}") {
                projectV2(number: 1) {
                  items(first: 100) { nodes { id content { ... on Issue { number } } } }
                }
              }
            }`;
            const itemResult = await github.graphql(itemQuery);
            const item = itemResult.user.projectV2.items.nodes.find(n => n.content && n.content.number === issue_number);
            if (item) {
              const updateMutation = `mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project, itemId: $item, fieldId: $field,
                  value: { singleSelectOptionId: $value }
                }) { projectV2Item { id } }
              }`;
              await github.graphql(updateMutation, {
                project: process.env.PROJECT_ID, item: item.id,
                field: process.env.STATUS_FIELD_ID, value: process.env.OPT_PR_OPEN
              });
              console.log(`Moved issue #${issue_number} to Pr Open`);
            }

  # ===================================================================
  # Reviewer job - fires when /oc is commented on a PR
  # Flow: Pr Open -> In Review -> (Changes Requested | Human Approval)
  # ===================================================================
  reviewer:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Extract linked issue and mark in review + move board
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.issue.number;

            // Get PR to find linked issue
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
            const body = pr.body || "";
            const match = body.match(/closes\s+#(\d+)/i);
            const issue_number = match ? parseInt(match[1]) : null;
            core.setOutput("issue_number", issue_number || "");

            if (issue_number) {
              // Update labels
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: "agent:pr-open" }); } catch (e) {}
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
              if (!labels.some(l => l.name === "agent:needs-review")) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["agent:needs-review"] });
              }

              // Directly update project board via GraphQL
              const itemQuery = `query {
                user(login: "${owner}") {
                  projectV2(number: 1) {
                    items(first: 100) { nodes { id content { ... on Issue { number } } } }
                  }
                }
              }`;
              const itemResult = await github.graphql(itemQuery);
              const item = itemResult.user.projectV2.items.nodes.find(n => n.content && n.content.number === issue_number);
              if (item) {
                const updateMutation = `mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $project, itemId: $item, fieldId: $field,
                    value: { singleSelectOptionId: $value }
                  }) { projectV2Item { id } }
                }`;
                await github.graphql(updateMutation, {
                  project: process.env.PROJECT_ID, item: item.id,
                  field: process.env.STATUS_FIELD_ID, value: process.env.OPT_IN_REVIEW
                });
                console.log(`Moved issue #${issue_number} to In Review`);
              }
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            Review this pull request as the Orbit review agent.

            CRITICAL GIT RULES:
            - Do NOT create or switch git branches.
            - Do NOT run git push or git remote commands.
            - Do NOT create pull requests.

            Review steps:
            1. Read AGENTS.md and the linked issue (from "Closes #N" in the PR body).
            2. Review the PR diff for:
               - Correctness against the linked issue's acceptance criteria
               - Serious bugs and edge cases
               - Security or secrets leakage
               - Trading-safety regressions
               - Performance regressions
               - Maintainability problems that will cause near-term issues
            3. Do NOT make low-value style comments unless they block readability or project consistency.
            4. After reviewing, submit a formal PR review using the gh CLI:
               - If the PR is acceptable: gh pr review <PR_NUMBER> --approve --body "<summary>"
               - If changes are needed: gh pr review <PR_NUMBER> --request-changes --body "<list of issues>"
            5. You MUST submit a formal review via gh pr review. Do not just leave a comment.
            6. Use GITHUB_TOKEN for authentication (it's already in the environment).
