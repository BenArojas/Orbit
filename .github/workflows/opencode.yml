name: opencode

# opencode runner for the issue-driven board flow.
#   planner  — /oc (or /opencode) on an issue WITH agent:needs-planning
#   coder    — /oc (or /opencode) on an issue WITHOUT agent:needs-planning
#   reviewer — /oc (or /opencode) on a pull request
# Board column + label moves go through ./.github/actions/board-sync (shared
# with claude-code.yml and codex.yml). The opencode action handles branch,
# commit, push, and PR creation itself.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ===================================================================
  # Planner — break a parent issue into small executable sub-issues.
  # Flow: Needs Planning -> (creates sub-issues) -> Ready for Coding
  # ===================================================================
  planner:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Check if issue needs planning
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const needsPlanning = labels.some(l => l.name === "agent:needs-planning");
            core.setOutput("needs_planning", needsPlanning ? "true" : "false");
            if (needsPlanning) {
              console.log("Issue has agent:needs-planning label - running planner job");
            } else {
              console.log("Issue does not have agent:needs-planning label - skipping planner job");
            }

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.needs_planning == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            You are the Orbit planner agent. Read this parent issue and break it down into small executable sub-issues.

            Steps:
            1. Read the parent issue body and all comments carefully.
            2. Read AGENTS.md for workflow rules, constraints, and non-goals.
            3. Break the goal into 1-5 small tasks, each small enough for one focused PR.
            4. For each task, create a GitHub issue using:
               gh issue create --title "[Task]: <short title>" --label "agent:ready-for-coding" --label "risk:low" --body "<body>"
            5. The issue body MUST include these sections:
               - Task: What exactly should change
               - Relevant files: List likely files (keep it narrow)
               - Acceptance criteria: Concrete checklist
               - Non-goals: What to avoid
               - Test command: Which tests to run
               - Risk level: risk:low (or higher if justified)
               - Parent issue: "Part of #N"
            6. Do NOT create branches, push code, or open PRs. You are planning only.
            7. Do NOT create or switch git branches. Do NOT run git push or git remote commands.
            8. Keep each task tiny and safe. Prefer smaller tasks over larger ones.

      - name: Move parent to ready for coding
        if: steps.check.outputs.needs_planning == 'true' && success()
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ github.event.issue.number }}
          remove-labels: "agent:needs-planning"
          add-labels: "agent:ready-for-coding"
          status: "ready-for-coding"

  # ===================================================================
  # Coder — implement an approved issue; the opencode action opens the PR.
  # Flow: Ready for Coding / Changes Requested -> In Progress -> Pr Open
  # ===================================================================
  coder:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Check if issue needs planning (skip coder if so)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const needsPlanning = labels.some(l => l.name === "agent:needs-planning");
            core.setOutput("needs_planning", needsPlanning ? "true" : "false");

      - name: Mark issue in progress + move board
        if: steps.check.outputs.needs_planning == 'false'
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ github.event.issue.number }}
          remove-labels: "agent:ready-for-coding,agent:changes-requested"
          add-labels: "agent:in-progress"
          status: "in-progress"

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.needs_planning == 'false'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            Implement this issue. Follow AGENTS.md for project rules.

            CRITICAL GIT RULES:
            - Do NOT create or switch git branches. The infrastructure creates a branch automatically.
            - Do NOT run git push, git remote, or any git remote commands.
            - Do NOT create pull requests or use gh pr create.
            - Just implement the changes, stage them with git add, and commit with git commit.
            - The opencode infrastructure handles branch creation, push, and PR creation automatically.

            Workflow:
            1. Read the issue body and acceptance criteria.
            2. Read AGENTS.md for project rules and constraints.
            3. Implement the smallest change that satisfies the issue.
            4. Run the test command from the issue if specified.
            5. git add and git commit your changes.
            6. Stop. The infrastructure will push and open a PR.

      - name: Ensure PR is linked to the issue
        if: steps.check.outputs.needs_planning == 'false' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", sort: "created", direction: "desc", per_page: 20,
            });
            let linkedPr = null;
            for (const pr of prs) {
              const match = (pr.body || "").match(/closes\s+#(\d+)/i);
              if (match && parseInt(match[1]) === issue_number) { linkedPr = pr; break; }
            }
            if (!linkedPr) {
              for (const pr of prs) {
                if (pr.head.ref.startsWith("opencode/") || pr.head.ref.startsWith("agent/")) { linkedPr = pr; break; }
              }
            }
            if (linkedPr) {
              const body = linkedPr.body || "";
              if (!new RegExp(`closes\\s+#${issue_number}`, "i").test(body)) {
                await github.rest.pulls.update({ owner, repo, pull_number: linkedPr.number, body: body + `\n\nCloses #${issue_number}` });
                console.log(`Patched PR #${linkedPr.number} with 'Closes #${issue_number}'`);
              }
            } else {
              console.log("No linked PR found yet.");
            }

      - name: Mark PR open + move board
        if: steps.check.outputs.needs_planning == 'false' && success()
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ github.event.issue.number }}
          remove-labels: "agent:in-progress"
          add-labels: "agent:pr-open"
          status: "pr-open"

  # ===================================================================
  # Reviewer — review a PR and route it to Changes Requested / Human Approval.
  # Flow: Pr Open -> In Review -> (Changes Requested | Human Approval)
  # ===================================================================
  reviewer:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract linked issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
            const match = (pr.body || "").match(/closes\s+#(\d+)/i);
            core.setOutput("issue_number", match ? match[1] : "");
            core.setOutput("pr_number", String(pr_number));

      - name: Mark in review + move board
        if: steps.extract.outputs.issue_number != ''
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ steps.extract.outputs.issue_number }}
          remove-labels: "agent:pr-open"
          add-labels: "agent:needs-review"
          status: "in-review"

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/z-ai/glm-5.2
          use_github_token: true
          prompt: |
            Review this pull request as the Orbit review agent.

            CRITICAL GIT RULES:
            - Do NOT create or switch git branches.
            - Do NOT run git push or git remote commands.
            - Do NOT create pull requests.

            Review steps:
            1. Read AGENTS.md and the linked issue (from "Closes #N" in the PR body).
            2. Review the PR diff for:
               - Correctness against the linked issue's acceptance criteria
               - Serious bugs and edge cases
               - Security or secrets leakage
               - Trading-safety regressions
               - Performance regressions
               - Maintainability problems that will cause near-term issues
            3. Do NOT make low-value style comments unless they block readability or project consistency.
            4. After reviewing, submit a formal PR review using the gh CLI:
               - If the PR is acceptable: gh pr review <PR_NUMBER> --approve --body "<summary>"
               - If changes are needed: gh pr review <PR_NUMBER> --request-changes --body "<list of issues>"
            5. You MUST submit a formal review via gh pr review. Do not just leave a comment.
            6. Use GITHUB_TOKEN for authentication (it's already in the environment).

      - name: Determine review verdict
        id: verdict
        if: steps.extract.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = parseInt('${{ steps.extract.outputs.pr_number }}');
            const { data: reviews } = await github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 });
            const states = reviews.map(r => r.state);
            let verdict = "none";
            if (states.lastIndexOf("CHANGES_REQUESTED") > states.lastIndexOf("APPROVED")) verdict = "changes_requested";
            else if (states.includes("APPROVED")) verdict = "approved";
            core.setOutput("verdict", verdict);
            console.log(`Latest review verdict: ${verdict}`);

      - name: Route approved -> Human Approval
        if: steps.verdict.outputs.verdict == 'approved'
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ steps.extract.outputs.issue_number }}
          remove-labels: "agent:needs-review"
          add-labels: "human:needs-approval"
          status: "human-approval"

      - name: Route changes requested -> Changes Requested
        if: steps.verdict.outputs.verdict == 'changes_requested'
        uses: ./.github/actions/board-sync
        with:
          project-pat: ${{ secrets.PROJECT_PAT }}
          issue-number: ${{ steps.extract.outputs.issue_number }}
          remove-labels: "agent:needs-review"
          add-labels: "agent:changes-requested"
          status: "changes-requested"
