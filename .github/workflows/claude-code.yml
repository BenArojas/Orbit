name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 6
            --append-system-prompt "Follow AGENTS.md, CLAUDE.md, the linked issue, and the PR template. Keep responses concise. Prefer minimal diffs. Do not merge. Stop for human approval on high-risk changes."
