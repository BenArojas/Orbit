# ──────────────────────────────────────────────────────────────────────────────
# Parallax — Release workflow
#
# Trigger:  push a semver tag to main, e.g.
#               git tag v0.1.0 && git push origin v0.1.0
#
# Outputs:
#   macOS  — Parallax_<version>_universal.dmg  (arm64 + x86_64 lipo'd)
#   Windows — Parallax_<version>_x64-setup.exe (NSIS) + Parallax_<version>_x64_en-US.msi
#
# No code signing — macOS users: right-click → Open to bypass Gatekeeper.
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable

jobs:
  # ── 1a. Build PyInstaller sidecar — macOS arm64 ──────────────────────────
  sidecar-macos-arm64:
    name: Sidecar / macOS arm64
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies + PyInstaller
        working-directory: backend
        run: uv sync && uv pip install pyinstaller

      - name: Build sidecar (arm64)
        working-directory: backend
        run: |
          uv run pyinstaller parallax-backend.spec \
            --distpath ../dist-pyinstaller-arm64 \
            --workpath  ../build-pyinstaller-arm64 \
            --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-macos-arm64
          path: dist-pyinstaller-arm64/parallax-backend
          if-no-files-found: error

  # ── 1b. Build PyInstaller sidecar — macOS x86_64 ─────────────────────────
  sidecar-macos-x86_64:
    name: Sidecar / macOS x86_64
    runs-on: macos-13   # Intel
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies + PyInstaller
        working-directory: backend
        run: uv sync && uv pip install pyinstaller

      - name: Build sidecar (x86_64)
        working-directory: backend
        run: |
          uv run pyinstaller parallax-backend.spec \
            --distpath ../dist-pyinstaller-x86_64 \
            --workpath  ../build-pyinstaller-x86_64 \
            --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-macos-x86_64
          path: dist-pyinstaller-x86_64/parallax-backend
          if-no-files-found: error

  # ── 2. Build Tauri app — macOS universal .dmg ────────────────────────────
  build-macos:
    name: Build / macOS universal
    needs: [sidecar-macos-arm64, sidecar-macos-x86_64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Download arm64 sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-macos-arm64
          path: /tmp/sidecar-arm64

      - name: Download x86_64 sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-macos-x86_64
          path: /tmp/sidecar-x86_64

      - name: Lipo sidecars into universal binary
        run: |
          mkdir -p src-tauri/binaries
          lipo -create \
            /tmp/sidecar-arm64/parallax-backend \
            /tmp/sidecar-x86_64/parallax-backend \
            -output src-tauri/binaries/parallax-backend-universal-apple-darwin
          chmod +x src-tauri/binaries/parallax-backend-universal-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Parallax ${{ github.ref_name }}"
          releaseBody: |
            ## Parallax ${{ github.ref_name }}

            ### macOS
            Download `Parallax_*_universal.dmg`.
            **First launch:** right-click the app → Open (bypasses Gatekeeper — no code signing in v1).

            ### Windows
            Download `Parallax_*_x64-setup.exe` (recommended) or the `.msi` installer.
            WebView2 is downloaded automatically if not already installed.

            ### Data
            All data (watchlists, settings, triggers) lives in `~/.parallax/`.
            Safe to reinstall — your data is preserved.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  # ── 3. Build Tauri app — Windows x64 ─────────────────────────────────────
  build-windows:
    name: Build / Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies + PyInstaller
        working-directory: backend
        run: uv sync && uv pip install pyinstaller

      - name: Build sidecar (Windows x64)
        working-directory: backend
        shell: pwsh
        run: |
          uv run pyinstaller parallax-backend.spec `
            --distpath ..\dist-pyinstaller `
            --workpath ..\build-pyinstaller `
            --clean --noconfirm

      - name: Place sidecar in binaries/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Copy-Item dist-pyinstaller\parallax-backend.exe `
            src-tauri\binaries\parallax-backend-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Parallax ${{ github.ref_name }}"
          releaseBody: |
            ## Parallax ${{ github.ref_name }}

            ### macOS
            Download `Parallax_*_universal.dmg`.
            **First launch:** right-click the app → Open (bypasses Gatekeeper — no code signing in v1).

            ### Windows
            Download `Parallax_*_x64-setup.exe` (recommended) or the `.msi` installer.
            WebView2 is downloaded automatically if not already installed.

            ### Data
            All data (watchlists, settings, triggers) lives in `~/.parallax/`.
            Safe to reinstall — your data is preserved.
          releaseDraft: true
          prerelease: false
